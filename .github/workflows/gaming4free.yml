name: Game4Free-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            xdotool

      - name: 🐍 安装 Python 依赖
        working-directory: gaming4free-renew
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🛡️ 启用 WARP 网络 (proxy 模式)
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: proxy

      - name: 🔧 验证 WARP 连接
        run: |
          sleep 3
          echo "[INFO] WARP SOCKS5 代理测试:"
          curl -x socks5://127.0.0.1:40000 -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -x socks5://127.0.0.1:40000 -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 🚀 运行续期脚本 (WARP 系统代理)
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
        working-directory: gaming4free-renew
        run: |
          echo "🛡️ 使用 WARP 系统级代理"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/*.png
          if-no-files-found: ignore
          retention-days: 3
