name: Game4Free-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xvfb xdotool wget unzip \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 fonts-liberation

      - name: Install Chrome and Chromedriver
        run: |
          CHROME_VERSION="124.0.6367.91"
          echo "[INFO] Chrome version: $CHROME_VERSION"
          
          CHROME_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chrome-linux64.zip"
          wget --timeout=60 "$CHROME_URL" -O /tmp/chrome.zip || exit 1
          unzip -q /tmp/chrome.zip -d /opt/
          sudo cp /opt/chrome-linux64/chrome /usr/bin/google-chrome
          sudo chmod +x /usr/bin/google-chrome
          
          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          wget --timeout=60 "$CHROMEDRIVER_URL" -O /tmp/chromedriver.zip || exit 1
          unzip -q /tmp/chromedriver.zip -d /opt/
          sudo cp /opt/chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          
          echo "[INFO] Chrome: $(/usr/bin/google-chrome --version)"
          echo "[INFO] Chromedriver: $(chromedriver --version)"

      - name: Install Python dependencies
        working-directory: gaming4free-renew
        run: |
          pip install seleniumbase

      - name: Setup proxy (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            sleep 5
            if curl -x "socks5://127.0.0.1:1080" --max-time 5 -s https://api.ipify.org > /dev/null 2>&1; then
              echo "IS_PROXY=true" >> $GITHUB_ENV
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              echo "Proxy IP: $(curl -x 'socks5://127.0.0.1:1080' -s https://api.ipify.org)"
            else
              echo "IS_PROXY=false" >> $GITHUB_ENV
              echo "PROXY_SERVER=" >> $GITHUB_ENV
            fi
          else
            echo "IS_PROXY=false" >> $GITHUB_ENV
            echo "PROXY_SERVER=" >> $GITHUB_ENV
          fi

      - name: Verify proxy
        run: |
          if [ "${IS_PROXY}" = "true" ]; then
            curl -x "$PROXY_SERVER" -s --max-time 10 https://api.ipify.org && echo
          else
            curl -s --max-time 10 https://api.ipify.org && echo
          fi

      - name: Run renewal script
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          GAME4FREE_COOKIE: ${{ secrets.GAME4FREE_COOKIE }}
          IS_PROXY: ${{ env.IS_PROXY }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        working-directory: gaming4free-renew
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/debug_output/
          if-no-files-found: warn
          retention-days: 3
