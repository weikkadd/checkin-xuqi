name: Game4Free-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            xdotool

      - name: 🐍 安装 Python 依赖
        working-directory: gaming4free-renew
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🔗 设置代理 (sing-box, 家宽节点)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            PROTO=$(echo "$NODE_LINK" | cut -d':' -f1)
            echo "[INFO] PROXY_URL 协议: $PROTO"
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
          else
            echo "[WARN] PROXY_URL 未配置, 直连模式"
          fi

      - name: 🔧 验证代理连接
        run: |
          if [ "${IS_PROXY}" = "true" ]; then
            echo "[INFO] 代理出口 IP:"
            curl -x "$PROXY_SERVER" -s --max-time 10 https://api.ipify.org && echo
          else
            echo "[WARN] 代理未启用"
            curl -s --max-time 10 https://api.ipify.org && echo
          fi

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          IS_PROXY: ${{ env.IS_PROXY }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        working-directory: gaming4free-renew
        run: |
          echo "代理状态: IS_PROXY=${IS_PROXY:-false}, PROXY_SERVER=${PROXY_SERVER:-无}"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/*.png
          if-no-files-found: ignore
          retention-days: 3
