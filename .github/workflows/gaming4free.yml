name: Game4Free 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: 从 git blob 恢复 renew.py（绕过 autocrlf）
        run: |
          cd gaming4free-renew
          # 检查文件是否被压缩
          LINE_COUNT=$(wc -l < renew.py)
          echo "renew.py has $LINE_COUNT lines"
          if [ "$LINE_COUNT" -lt 10 ]; then
            echo "ERROR: File is corrupted, restoring from git blob..."
            # 从 git blob 直接提取文件内容，绕过 checkout 的 autocrlf
            COMMIT=$(git rev-parse HEAD)
            git show "$COMMIT:gaming4free-renew/renew.py" > renew.py.tmp
            mv renew.py.tmp renew.py
            LINE_COUNT=$(wc -l < renew.py)
            echo "Restored: $LINE_COUNT lines"
          fi
          # 确保使用 LF 换行符
          sed -i 's/\r$//' renew.py
          LINE_COUNT=$(wc -l < renew.py)
          echo "Final: $LINE_COUNT lines"
          head -5 renew.py

      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Chrome 浏览器
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb xdotool wget \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 fonts-liberation

      - name: 安装 Python 依赖
        working-directory: gaming4free-renew
        run: pip install seleniumbase

      - name: 配置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            sleep 5
            if curl -x "socks5://127.0.0.1:1080" --max-time 5 -s https://api.ipify.org > /dev/null 2>&1; then
              echo "IS_PROXY=true" >> $GITHUB_ENV
            fi
          fi

      - name: 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_RENEW_URL: ${{ secrets.GAME4FREE_RENEW_URL }}
          GAME4FREE_COOKIE: ${{ secrets.GAME4FREE_COOKIE }}
          GAME4FREE_ACCOUNTS: ${{ secrets.GAME4FREE_ACCOUNTS }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          SB_SKIP_DRIVER_UPDATE: "true"
          CHROME_BIN: /opt/hostedtoolcache/bin/google-chrome
        working-directory: gaming4free-renew
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/debug_output/
          if-no-files-found: warn
          retention-days: 3
