name: Game4Free-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xvfb \
            xdotool \
            wget

      - name: 🌐 安装 Chrome 和匹配的 Chromedriver
        run: |
          CHROME_VERSION="124.0.6367"
          echo "[INFO] Chrome 主版本: $CHROME_VERSION"
          CHROME_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chrome-linux64.zip"
          wget -q "$CHROME_URL" -O /tmp/chrome.zip
          unzip -q /tmp/chrome.zip -d /opt/
          sudo cp /opt/chrome-linux64/google-chrome /usr/bin/
          sudo chmod +x /usr/bin/google-chrome
          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          wget -q "$CHROMEDRIVER_URL" -O /tmp/chromedriver.zip
          unzip -q /tmp/chromedriver.zip -d /tmp/
          sudo cp /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          echo "[INFO] Chrome: $(/usr/bin/google-chrome --version)"
          echo "[INFO] Chromedriver: $(chromedriver --version)"

      - name: 🐍 安装 Python 依赖
        working-directory: gaming4free-renew
        run: |
          pip install seleniumbase

      - name: 🔗 设置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            sleep 5
            if curl -x "socks5://127.0.0.1:1080" --max-time 5 -s https://api.ipify.org > /dev/null 2>&1; then
              echo "IS_PROXY=true" >> $GITHUB_ENV
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              echo "代理出口: $(curl -x 'socks5://127.0.0.1:1080' -s https://api.ipify.org)"
            else
              echo "IS_PROXY=false" >> $GITHUB_ENV
              echo "PROXY_SERVER=" >> $GITHUB_ENV
            fi
          else
            echo "IS_PROXY=false" >> $GITHUB_ENV
            echo "PROXY_SERVER=" >> $GITHUB_ENV
          fi

      - name: 🔧 验证代理连接
        run: |
          if [ "${IS_PROXY}" = "true" ]; then
            curl -x "$PROXY_SERVER" -s --max-time 10 https://api.ipify.org && echo
          else
            curl -s --max-time 10 https://api.ipify.org && echo
          fi

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          GAME4FREE_COOKIE: ${{ secrets.GAME4FREE_COOKIE }}
          IS_PROXY: ${{ env.IS_PROXY }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        working-directory: gaming4free-renew
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/debug_output/
          if-no-files-found: warn
          retention-days: 3
