name: gaming4free renew (WARP + Python)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # 每 2 小时跑一次（错峰避开整点拥堵）
    # gaming4free 上限 48h，2h 一次足够保险
    - cron: "13 */2 * * *"

# 同一时刻只允许一个续期任务跑
concurrency:
  group: gaming4free-renew
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1. 安装官方 WARP 客户端（纯 SOCKS5 模式）
      # =========================
      - name: Setup Official WARP Proxy
        run: |
          set +e
          # 方案 A：从 Cloudflare 官方 APT 源安装
          install_warp_via_apt() {
            echo "==> 方案 A: 通过 Cloudflare 官方 APT 源安装"
            curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
              | sudo gpg --yes --dearmor \
              --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" \
              | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends cloudflare-warp
            return $?
          }

          # 方案 B：直接下载 deb 包安装
          install_warp_via_deb() {
            echo "==> 方案 B: 直接下载 cloudflare-warp deb 包安装"
            cd /tmp
            # 尝试多个版本
            for url in \
              "https://pkg.cloudflareclient.com/pool/jammy/main/c/cloudflare-warp/cloudflare-warp_2024.6.531.0_amd64.deb" \
              "https://pkg.cloudflareclient.com/pool/jammy/main/c/cloudflare-warp/cloudflare-warp_2024.3.1_amd64.deb" \
              "https://pkg.cloudflareclient.com/pool/jammy/main/c/cloudflare-warp/cloudflare-warp_2024.1.1_amd64.deb"; do
              echo "尝试: $url"
              if curl -fSL -o warp.deb "$url"; then
                sudo apt-get install -y ./warp.deb || sudo dpkg -i ./warp.deb || true
                sudo apt-get install -f -y
                return $?
              fi
            done
            return 1
          }

          # 尝试安装：先 APT，失败再 deb
          if ! install_warp_via_apt; then
            echo "⚠️ APT 方式失败，尝试 deb 直装"
            install_warp_via_deb
          fi

          # 验证 warp-cli 是否可用
          if ! command -v warp-cli >/dev/null 2>&1; then
            echo "❌ warp-cli 安装失败，两种方式都不行"
            exit 1
          fi
          echo "✅ warp-cli 已安装: $(warp-cli --version 2>&1 | head -1)"

          # 注册并设置为纯代理模式（默认 40000 端口）
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy || true
          warp-cli --accept-tos connect || true

          echo "⏳ 等待 WARP 隧道建立 ..."
          IP=""
          for i in {1..45}; do
            IP=$(curl -s --max-time 5 -x socks5://127.0.0.1:40000 https://api.ipify.org 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "✅ WARP ready after ${i}s, exit IP: $IP"
              echo "WARP_IP=$IP" >> $GITHUB_ENV
              break
            fi
            # 如果 30s 还没起来，重连一次
            if [ $i -eq 30 ]; then
              echo "⚠️ 30s 未通，尝试重连..."
              warp-cli --accept-tos disconnect || true
              sleep 2
              warp-cli --accept-tos connect || true
            fi
            sleep 1
          done

          if [ -z "$IP" ]; then
            echo "❌ WARP 启动失败 - 诊断信息:"
            warp-cli --accept-tos status 2>&1 || true
            warp-cli --accept-tos settings 2>&1 || true
            ss -tlnp 2>/dev/null | grep 40000 || echo "端口 40000 未监听"
            exit 1
          fi

      # =========================
      # 🟡 2. 安装系统依赖（Xvfb + 音频解码）
      # =========================
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg libglib2.0-0 libnss3 libnspr4 \
                                 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
                                 libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
                                 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
                                 libpango-1.0-0 libcairo2 libasound2

      # =========================
      # 🟡 3. Python 环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        working-directory: gaming4free-renew
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sbase install chromium

      # =========================
      # 🟡 4. 运行续期脚本
      # =========================
      - name: Run renew script
        env:
          MC_USERNAME:  ${{ secrets.MC_USERNAME }}
          MC_PASSWORD:  ${{ secrets.MC_PASSWORD }}
          GF_SITE_URL:  ${{ secrets.GF_SITE_URL }}
          GF_LOGIN_URL: ${{ secrets.GF_LOGIN_URL }}
          GF_COOKIE:    ${{ secrets.GF_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        working-directory: gaming4free-renew
        run: |
          mkdir -p screenshots
          xvfb-run -a --server-args="-screen 0 1280x800x24" python renew.py

      # =========================
      # 🟡 5. 上传截图 + 日志（失败也上传）
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_id }}
          path: gaming4free-renew/screenshots/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renew-log-${{ github.run_id }}
          path: gaming4free-renew/renew.log
          if-no-files-found: warn
          retention-days: 7
