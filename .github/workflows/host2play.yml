name: host2play 缁湡

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 瑙﹀彂鐐? 00:00, 11:00, 22:00 (UTC) = 鍖椾含 08:00, 19:00, 06:00
    - cron: '30 5,16 * * *'      # 瑙﹀彂鐐? 05:30, 16:30 (UTC) = 鍖椾含 13:30, 00:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 鎵ц缁湡
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 鎷夊彇浠撳簱
        uses: actions/checkout@v4

      - name: 閰嶇疆 Python 鐜
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 瀹夎绯荤粺渚濊禆
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 瀹夎 Python 渚濊禆
        working-directory: host2play-renew
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 鍚敤 WARP 缃戠粶
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 淇 DNS
        run: |
          echo "[INFO] 鍋滅敤 systemd-resolved锛岃缃叕鍏?DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 娴嬭瘯:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 瑙ｆ瀽澶辫触"

          echo ""
          echo "[INFO] 褰撳墠鍑哄彛 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 鎵ц缁湡
        env:
          H2P_RENEW_URL: ${{ secrets.H2P_RENEW_URL }}
          H2P_COOKIE: ${{ secrets.H2P_COOKIE }}
          H2P_ACCOUNTS: ${{ secrets.H2P_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        working-directory: host2play-renew
        run: |
          mkdir -p output/screenshots
          python main.py

      - name: 涓婁紶鎴浘
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-screenshots-${{ github.run_number }}
          path: host2play-renew/output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 涓婁紶鏃ュ織
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-log-${{ github.run_number }}
          path: host2play-renew/renew.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 娓呯悊鍘嗗彶杩愯璁板綍
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2