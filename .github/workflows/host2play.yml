name: host2play 续期

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00 (UTC) = 北京 08:00, 19:00, 06:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30 (UTC) = 北京 13:30, 00:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl jq
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        working-directory: host2play-renew
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sleep 2

      - name: 启动代理并执行续期
        env:
          H2P_RENEW_URL: ${{ secrets.H2P_RENEW_URL }}
          H2P_COOKIE: ${{ secrets.H2P_COOKIE }}
          H2P_ACCOUNTS: ${{ secrets.H2P_ACCOUNTS }}
          PROXY_URL: "socks5://127.0.0.1:1080"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            echo "[INFO] 获取 sing-box 最新版本..."
            latest_version=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
            echo "[INFO] 最新稳定版本: $latest_version"
            
            curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${latest_version}/sing-box-${latest_version#v}-linux-amd64.tar.gz"
            tar -xzf sing-box.tar.gz
            cp sing-box-*/sing-box .
            chmod +x sing-box

            echo "[INFO] 正在生成 sing-box 配置..."
            UUID=$(echo $NODE_LINK | sed -n 's/.*tuic:\/\/\([^%]*\).*/\1/p')
            PASS=$(echo $NODE_LINK | sed -n 's/.*%3A\([^@]*\)@.*/\1/p')
            ADDR=$(echo $NODE_LINK | sed -n 's/.*@\([^:]*\):.*/\1/p')
            PORT=$(echo $NODE_LINK | sed -n 's/.*:\([0-9]*\)?.*/\1/p')
            SNI=$(echo $NODE_LINK | sed -n 's/.*sni=\([^&]*\).*/\1/p')
            
            cat <<EOF > config.json
{
  "log": { "level": "info" },
  "outbounds": [
    {
      "type": "tuic",
      "tag": "proxy",
      "server": "$ADDR",
      "server_port": $PORT,
      "uuid": "$UUID",
      "password": "$PASS",
      "congestion_control": "bbr",
      "alpn": ["h3"],
      "tls": { "enabled": true, "server_name": "$SNI", "insecure": true }
    }
  ],
  "inbounds": [
    { "type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 1080 }
  ]
}
EOF
            echo "[INFO] ✅ sing-box 配置已生成"

            echo "[INFO] 启动 sing-box..."
            ./sing-box run -c config.json > sing-box.log 2>&1 &
            
            echo "⏳ 等待代理就绪..."
            MAX_RETRIES=15
            for ((i=1; i<=MAX_RETRIES; i++)); do
              if curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip > /dev/null; then
                echo "[INFO] ✅ 代理连接成功"
                echo "📍 出口 IP: $(curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip)"
                break
              fi
              sleep 3
              [ $i -eq $MAX_RETRIES ] && echo "❌ 代理连接超时" && exit 1
            done
          fi
          
          echo "🚀 开始执行续期脚本..."
          cd host2play-renew
          mkdir -p output/screenshots
          python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-screenshots-${{ github.run_number }}
          path: host2play-renew/output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-log-${{ github.run_number }}
          path: host2play-renew/renew.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
